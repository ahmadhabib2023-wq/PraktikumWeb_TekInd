<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kalkulator Lingkaran</title>
    <link rel="stylesheet" href="Latihan1.css" />
  </head>
  <body>
    <div class="container">
      <h1>Kalkulator Lingkaran</h1>
      <p>Hitung Luas dan Keliling Lingkaran</p>

      <div class="form-box">
        <label>Masukkan Jari-jari:</label>
        <input type="number" id="jariJari" placeholder="Contoh: 7" />

        <button onclick="hitung()">Hitung</button>
      </div>

      <div class="hasil">
        <h3>Hasil Perhitungan</h3>
        <p id="luas">Luas : -</p>
        <p id="keliling">Keliling : -</p>
      </div>
    </div>

    <script src="Latihan1.js"></script>
  </body>
</html>
