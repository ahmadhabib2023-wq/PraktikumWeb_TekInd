<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kalkulator Listrik</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="Mini Proyek.css" />
  </head>

  <body>
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          Kalkulator Tagihan Listrik
        </div>

        <div class="card-body">
          <!-- Input Daya -->
          <div class="mb-3">
            <label>Daya (Watt)</label>
            <input
              type="number"
              id="daya"
              class="form-control"
              placeholder="Contoh: 900"
            />
          </div>

          <!-- Input Jam -->
          <div class="mb-3">
            <label>Jam Pemakaian</label>
            <input
              type="number"
              id="jam"
              class="form-control"
              placeholder="Contoh: 5"
            />
          </div>

          <!-- Hasil -->
          <div class="hasil-box text-center mt-4">
            <h3 id="hasilKwh">Total kWh: 0</h3>
            <h3 id="hasilBiaya">Estimasi Biaya: Rp 0</h3>
          </div>
        </div>
      </div>
    </div>

    <script src="Mini Proyek.js"></script>
  </body>
</html>
