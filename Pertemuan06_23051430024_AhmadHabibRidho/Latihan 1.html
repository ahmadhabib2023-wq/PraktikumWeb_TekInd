<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Control Panel Mesin</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS sendiri -->
    <link rel="stylesheet" href="Latihan 1.css" />
  </head>

  <body>
    <div class="container mt-5">
      <div class="card mt-4">
        <div class="card-header bg-dark text-white">
          Panel Kontrol Mesin -01
        </div>

        <div class="card-body text-center">
          <!-- Status -->
          <div id="statusIndicator" class="alert alert-secondary">
            Status: <strong>UNKNOWN</strong>
          </div>

          <!-- Suhu -->
          <h2 id="suhuMesin">25 °C</h2>
          <p>Suhu Operasional Saat Ini</p>

          <!-- Tombol -->
          <div class="d-grid gap-2 d-md-block">
            <button id="btnStart" class="btn btn-success btn-lg">START</button>
            <button id="btnStop" class="btn btn-danger btn-lg">STOP</button>
            <button id="btnReset" class="btn btn-warning btn-lg">RESET</button>
            <button id="btnMaintenance" class="btn btn-secondary btn-lg">
              MAINTENANCE MODE
            </button>
          </div>

          <!-- Input RPM -->
          <div class="mt-3">
            <label>Set Target Kecepatan (RPM):</label>
            <input
              type="number"
              id="inputRPM"
              class="form-control"
              placeholder="Max 2000 RPM"
            />
            <small id="pesanError" class="text-danger d-none">
              RPM melebihi batas aman!
            </small>
          </div>
        </div>
      </div>
    </div>

    <script src="Latihan 1.js"></script>
  </body>
</html>
