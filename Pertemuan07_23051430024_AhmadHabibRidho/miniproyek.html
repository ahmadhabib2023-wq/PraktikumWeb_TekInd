<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checklist Audit 5S</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="container mt-5">
    <h2 class="mb-4">Aplikasi Checklist Audit 5S</h2>

    <div class="row">
      <!-- FORM -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header">Form Audit 5S</div>
          <div class="card-body">
            <form id="form5S">
              <div class="mb-3">
                <label>Nama Auditor</label>
                <input type="text" id="auditor" class="form-control" required />
              </div>

              <label>Checklist 5S:</label>

              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="seiri" />
                <label class="form-check-label">Seiri</label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="seiton" />
                <label class="form-check-label">Seiton</label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="seiso" />
                <label class="form-check-label">Seiso</label>
              </div>

              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="seiketsu" />
                <label class="form-check-label">Seiketsu</label>
              </div>

              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="shitsuke" />
                <label class="form-check-label">Shitsuke</label>
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Simpan Audit
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- TABEL -->
      <div class="col-md-8">
        <h4>Riwayat Audit</h4>

        <table class="table table-bordered">
          <thead class="table-dark">
            <tr>
              <th>Tanggal</th>
              <th>Auditor</th>
              <th>Skor (%)</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <script src="miniproyek.js"></script>
  </body>
</html>
