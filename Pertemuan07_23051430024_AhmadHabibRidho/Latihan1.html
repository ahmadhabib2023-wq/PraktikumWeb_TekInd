<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form Produksi</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="container mt-5">
    <div class="row">
      <!-- FORM INPUT -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header">Input Data</div>
          <div class="card-body">
            <form id="formProduksi">
              <div class="mb-3">
                <label>Tanggal</label>
                <input type="date" id="tanggal" class="form-control" required />
              </div>

              <div class="mb-3">
                <label>Nama Operator</label>
                <input
                  type="text"
                  id="operator"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label>Shift</label>
                <select id="shift" class="form-select" required>
                  <option value="Pagi">Pagi</option>
                  <option value="Siang">Siang</option>
                  <option value="Malam">Malam</option>
                </select>
              </div>

              <div class="mb-3">
                <label>Jumlah Produksi</label>
                <input
                  type="number"
                  id="jumlah"
                  class="form-control"
                  min="1"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Simpan
              </button>
              <button
                type="button"
                id="btnHapusSemua"
                class="btn btn-danger w-100 mt-2"
              >
                Hapus Semua
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- TABEL -->
      <div class="col-md-8">
        <h3>Riwayat Produksi</h3>

        <!-- SEARCH -->
        <div class="mb-3">
          <label>Cari Nama Operator:</label>
          <input
            type="text"
            id="searchOperator"
            class="form-control"
            placeholder="Ketik nama operator..."
          />
        </div>

        <table class="table table-bordered table-striped">
          <thead class="table-dark">
            <tr>
              <th>Tanggal</th>
              <th>Operator</th>
              <th>Shift</th>
              <th>Jumlah</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <script src="Latihan1.js"></script>
  </body>
</html>
